<!DOCTYPE html>
<html lang="en">
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comic World!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Permanent+Marker&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #ffde00; /* Amarelo vibrante */
            /* Efeito de pontos Ben-Day (Quadrinhos) */
            background-image: radial-gradient(#f0c900 15%, transparent 16%);
            background-size: 20px 20px;
            font-family: 'Bangers', cursive;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
        }

        /* Container Principal estilo "Painel" */
        .comic-panel {
            background: white;
            border: 5px solid black;
            padding: 3rem;
            box-shadow: 15px 15px 0px 0px rgba(0,0,0,0.9);
            transform: rotate(-2deg);
            position: relative;
            max-width: 90%;
        }

        /* Título com efeito de explosão */
        .hello-title {
            font-size: 6rem;
            color: #e62117; /* Vermelho Marvel */
            text-transform: uppercase;
            -webkit-text-stroke: 2px black;
            text-shadow: 4px 4px 0px #000;
            margin-bottom: 0;
            line-height: 1;
        }

        /* Balão de Fala */
        .speech-bubble {
            position: absolute;
            background: #fff;
            border: 3px solid #000;
            border-radius: 50px;
            padding: 10px 20px;
            font-family: 'Permanent Marker', cursive;
            top: -40px;
            right: -20px;
            color: #000;
            transform: rotate(5deg);
        }

        .speech-bubble:after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 20px;
            border-width: 15px 15px 0;
            border-style: solid;
            border-color: #000 transparent;
            display: block;
            width: 0;
        }

        /* Botão Estilo "Action" */
        .btn-comic {
            background: #2a75bb; /* Azul Heroico */
            color: white;
            border: 3px solid black;
            font-size: 1.5rem;
            padding: 10px 30px;
            box-shadow: 5px 5px 0px black;
            transition: 0.1s;
            margin-top: 20px;
        }

        .btn-comic:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px black;
            background: #1e5488;
            color: white;
        }

        /* Elemento Decorativo (POW!) */
        .pow-sticker {
            position: absolute;
            bottom: -30px;
            left: -30px;
            background: #000;
            color: white;
            padding: 5px 15px;
            font-size: 2rem;
            transform: rotate(-15deg);
            clip-path: polygon(0% 15%, 15% 15%, 15% 0%, 85% 0%, 85% 15%, 100% 15%, 100% 85%, 85% 85%, 85% 100%, 15% 100%, 15% 85%, 0% 85%);
        }
    </style>
</head>
<body>

    <div class="comic-panel text-center">
        <div class="speech-bubble">HUH?!</div>

        <h1 class="hello-title">HELLO<br>WORLD!</h1>

        <p class="h4 text-dark mt-3">EDIÇÃO #01: O INÍCIO DE TUDO</p>

        <button class="btn btn-comic">LEIA MAIS!</button>

        <div class="pow-sticker">WOW!</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
