<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Wars Crawl - Hello World</title>
    <link href="https://fonts.googleapis.com/css2?family=Pathway+Gothic+One&display=swap" rel="stylesheet">
    <style>
        body {
            background: #000 url('https://www.transparenttextures.com/patterns/stardust.png');
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end; /* Alinha o painel de controle embaixo */
            height: 100vh;
            margin: 0;
            perspective: 300px; /* Cria o efeito de profundidade 3D */
            overflow: hidden;
            color: #FFE81F;
            font-family: 'Pathway Gothic One', sans-serif;
        }

        /* Container da animação */
        .crawl-container {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            transform-origin: 100% 100%;
            transform: rotateX(35deg); /* Inclina o texto para o horizonte */
            display: none; /* Escondido por padrão */
        }

        h1 {
            font-size: 5rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 10px;
            margin: 0;
            position: absolute;
            width: 100%;
            bottom: -100px; /* Começa fora da tela embaixo */
        }

        /* --- ANIMAÇÃO DE SUBIDA --- */
        @keyframes crawl {
            0% { bottom: -100px; opacity: 1; }
            100% { bottom: 120%; opacity: 0; } /* Sobe até sumir no topo */
        }

        /* ESTADO 1: JEDI (AZUL E SUBINDO) */
        .state-jedi .crawl-container {
            display: block;
        }
        .state-jedi h1 {
            color: #fff;
            text-shadow: 0 0 20px #2e67f8, 0 0 40px #2e67f8;
            animation: crawl 10s linear infinite;
        }

        /* ESTADO 2: SITH (VERMELHO, PISCANDO E SUBINDO RÁPIDO) */
        .state-sith .crawl-container {
            display: block;
        }
        .state-sith h1 {
            color: #fff;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
            animation: crawl 6s linear infinite, flicker 0.2s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Botão de Controle */
        .control-panel {
            z-index: 100;
            padding-bottom: 50px;
            text-align: center;
            background: linear-gradient(to top, black, transparent);
            width: 100%;
        }

        .btn-force {
            background: transparent;
            color: #FFE81F;
            border: 2px solid #FFE81F;
            padding: 15px 40px;
            font-family: 'Pathway Gothic One', sans-serif;
            font-size: 1.5rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-force:hover {
            background: #FFE81F;
            color: #000;
            box-shadow: 0 0 30px #FFE81F;
        }

        #status {
            margin-top: 10px;
            font-size: 1rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body id="mainBody">

    <div class="crawl-container">
        <h1 id="crawlText">Hello World</h1>
    </div>

    <div class="control-panel">
        <button class="btn-force" onclick="nextStage()">Sentir a Força</button>
        <div id="status">SISTEMA EM REPOUSO</div>
    </div>

    <script>
        let stage = 0;
        const body = document.getElementById('mainBody');
        const status = document.getElementById('status');

        function nextStage() {
            stage = (stage + 1) % 3;

            // Limpa os estados
            body.classList.remove('state-jedi', 'state-sith');

            if (stage === 0) {
                status.innerText = "SISTEMA EM REPOUSO";
                status.style.color = "#444";
            } else if (stage === 1) {
                body.classList.add('state-jedi');
                status.innerText = "LADO LUMINOSO: SUBINDO...";
                status.style.color = "#2e67f8";
            } else if (stage === 2) {
                body.classList.add('state-sith');
                status.innerText = "LADO SOMBRIO: INSTABILIDADE!";
                status.style.color = "#ff0000";
            }
        }
    </script>
</body>
</html>
