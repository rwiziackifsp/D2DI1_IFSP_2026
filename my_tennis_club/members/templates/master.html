<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Royal Tennis Club{% endblock %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --noble-green: #1a3c34;
            --champagne: #c5a358;
            --off-white: #f8f7f2;
            --sidebar-width: 250px;
        }

        body {
            font-family: 'Lato', sans-serif;
            margin: 0;
            display: flex;
            /* Cor de fundo creme aristocrático */
            background-color: #f4f1ea;

            /* TEXTURA ESTILO BRIDGERTON */
            /* Usamos um padrão sutil que remete a tecidos de seda antigos */
            background-image:
                radial-gradient(circle at 100% 150%, #f4f1ea 24%, #ede9df 25%, #ede9df 28%, #f4f1ea 29%, #f4f1ea 36%, #ede9df 36%, #ede9df 40%, transparent 40%),
                radial-gradient(circle at 0    150%, #f4f1ea 24%, #ede9df 25%, #ede9df 28%, #f4f1ea 29%, #f4f1ea 36%, #ede9df 36%, #ede9df 40%, transparent 40%),
                radial-gradient(circle at 50%  100%, #ede9df 10%, #f4f1ea 11%, #f4f1ea 23%, #ede9df 24%, #ede9df 30%, #f4f1ea 31%, #f4f1ea 43%, #ede9df 44%, #ede9df 50%, transparent 50%),
                radial-gradient(circle at 100% 50%, #ede9df 5%, #f4f1ea 6%, #f4f1ea 15%, #ede9df 16%, #ede9df 20%, #f4f1ea 21%, #f4f1ea 30%, #ede9df 31%, #ede9df 35%, transparent 35%),
                radial-gradient(circle at 0    50%, #ede9df 5%, #f4f1ea 6%, #f4f1ea 15%, #ede9df 16%, #ede9df 20%, #f4f1ea 21%, #f4f1ea 30%, #ede9df 31%, #ede9df 35%, transparent 35%);
            background-size: 80px 40px; /* Tamanho do padrão do papel de parede */

            color: #2d2d2d;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Ajuste no Content Block para ele "flutuar" sobre o papel de parede */
        .content-block {
            max-width: 900px;
            width: 95%;
            background: rgba(255, 255, 255, 0.92); /* Leve transparência para sofisticação */
            padding: clamp(20px, 5vw, 60px);
            margin-top: 20px;
            box-shadow: 0 15px 35px rgba(26, 60, 52, 0.1); /* Sombra na cor do clube */
            border-radius: 2px;
            border: 1px solid rgba(197, 163, 88, 0.2); /* Borda champagne finíssima */
            backdrop-filter: blur(5px); /* Efeito de vidro jateado moderno */
        }

        .content-block::before {
            content: '◈';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--champagne);
            font-size: 1.2rem;
            opacity: 0.5;
        }

        /* --- SIDEBAR REINVENTADA: ETIQUETA DE CLUBE --- */
        #sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--noble-green);
            position: fixed;
            left: calc(var(--sidebar-width) * -1); /* Totalmente oculta */
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 60px 30px;
            box-sizing: border-box;
            box-shadow: 5px 0 25px rgba(0,0,0,0.3);
        }

        /* Expande ao encostar na etiqueta ou na barra */
        #sidebar:hover {
            left: 0;
        }

        /* A ETIQUETA VINTAGE (LUGGAGE TAG) */
        .side-tag {
            position: absolute;
            right: -48px; /* Projeta-se para fora da borda esquerda */
            top: 120px;
            width: 48px;
            height: 160px;
            background: var(--champagne);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0 12px 12px 0;
            box-shadow: 4px 0 15px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* O "Furo" da etiqueta para realismo */
        .side-tag::before {
            content: '';
            position: absolute;
            top: 25px;
            left: 12px;
            width: 10px;
            height: 10px;
            background: var(--noble-green);
            border-radius: 50%;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .side-tag span {
            writing-mode: vertical-rl;
            text-transform: uppercase;
            color: var(--noble-green);
            /* A mágica do itálico serifado */
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 700;
            letter-spacing: 5px; /* Mais espaço entre letras = mais luxo */
            font-size: 0.85rem;
            transform: rotate(180deg);
            user-select: none;
            /* Efeito de gravação sutil */
            text-shadow: 0.5px 0.5px 0px rgba(255,255,255,0.3);
        }

        /* Animação Sutil para atrair o olhar */
        @keyframes tagAttention {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(8px); }
        }

        #sidebar:not(:hover) .side-tag {
            animation: tagAttention 2.5s infinite ease-in-out;
        }

        /* Links Internos */
        #sidebar .nav-links {
            margin-top: 40px;
        }

        #sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 18px 0;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(197, 163, 88, 0.15);
            transition: all 0.4s;
        }

        #sidebar a:hover {
            color: var(--champagne);
            padding-left: 15px;
            letter-spacing: 5px;
        }

        /* --- CONTEÚDO --- */
        main {
            flex-grow: 1;
            margin-left: 50px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: calc(100% - 50px);
        }

        header {
            margin-top: 2vh;
            text-align: center;
            position: relative;
            padding-bottom: 100px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 8vw, 3.5rem);
            color: var(--noble-green);
            margin: 0;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        header h1 a {
            text-decoration: none; /* Remove o underline */
            color: var(--noble-green); /* Mantém a cor do clube */
            transition: opacity 0.3s ease;
        }

        header h1 a:hover {
            color: var(--noble-green); /* Garante que não mude para azul ao passar o mouse */
            opacity: 0.8; /* Dá um feedback visual elegante de clique */
        }

        /* --- JOGADOR SVG ANIMADO --- */
        .player-container {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 120px;
            animation: playerFloat 3s infinite ease-in-out;
            opacity: 0.8;
        }

        @keyframes playerFloat {
            0%, 100% { transform: translateX(-50%) translateY(0) rotate(-2deg); }
            50% { transform: translateX(-50%) translateY(-10px) rotate(2deg); }
        }

        .content-block {
            max-width: 900px;
            width: 95%;
            background: white;
            padding: clamp(20px, 5vw, 60px);
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-radius: 4px;
            box-sizing: border-box;
        }

        @media (max-width: 768px) {
            #sidebar { left: -210px; }
            main { margin-left: 40px; padding: 20px; }
        }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="side-tag">
            <span>MENU</span>
        </div>

        <div style="text-align: center; margin-bottom: 30px;">
            <div style="font-family: 'Playfair Display', serif; color: var(--champagne); font-size: 2.2rem; font-weight: bold;">RTC</div>
            <div style="font-size: 0.6rem; color: rgba(255,255,255,0.5); letter-spacing: 2px; text-transform: uppercase; margin-top: 5px;">Est. 1922</div>
            <div style="height: 1px; background: linear-gradient(to right, transparent, var(--champagne), transparent); margin-top: 20px; width: 100%;"></div>
        </div>

        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/members/">Membros</a>
            <a href="#">Quadras</a>
            <a href="#">Nossa História</a>
        </div>

        <div style="margin-top: auto; font-size: 0.6rem; color: rgba(255,255,255,0.3); text-align: center; letter-spacing: 1px;">
            PRIVATE ACCESS ONLY
        </div>
    </nav>

    <main>
        <header>
        <h1><a href="/">Royal Tennis Club</a></h1>
            <div class="player-container"></div>
        </header>

        <div class="content-block">
            {% block content %}
            {% endblock %}
        </div>
    </main>

</body>
</html>
