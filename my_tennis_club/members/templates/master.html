<!DOCTYPE html>

<html lang="pt-br">
<head>
    {% load static %}

    <link rel="icon" type="image/x-icon" href="{% static 'img/favicon.ico' %}">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Members Tennis Club{% endblock %}</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --noble-green: #1a3c34;
            --champagne: #c5a358;
            --off-white: #f8f7f2;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: #f4f1ea;
            background-image:
                radial-gradient(circle at 100% 150%, #f4f1ea 24%, #ede9df 25%, #ede9df 28%, #f4f1ea 29%, #f4f1ea 36%, #ede9df 36%, #ede9df 40%, transparent 40%),
                radial-gradient(circle at 0    150%, #f4f1ea 24%, #ede9df 25%, #ede9df 28%, #f4f1ea 29%, #f4f1ea 36%, #ede9df 36%, #ede9df 40%, transparent 40%),
                radial-gradient(circle at 50%  100%, #ede9df 10%, #f4f1ea 11%, #f4f1ea 23%, #ede9df 24%, #ede9df 30%, #f4f1ea 31%, #f4f1ea 43%, #ede9df 44%, #ede9df 50%, transparent 50%);
            background-size: 80px 40px;
            color: #2d2d2d;
            min-height: 100vh;
        }

        /* --- ESTILOS DA NAVBAR (Separada logicamente, mas mantida no CSS global) --- */
        .offcanvas {
            background-color: var(--noble-green);
            color: white;
            border-right: 3px solid var(--champagne);
            width: 300px !important;
        }

        .nav-link-royal {
            color: white;
            text-decoration: none;
            display: block;
            padding: 1rem 0;
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(197, 163, 88, 0.15);
            transition: all 0.4s;
        }

        .nav-link-royal:hover {
            color: var(--champagne);
            padding-left: 15px;
        }

        .btn-menu-tag {
            position: fixed;
            left: 0;
            top: 120px;
            background: var(--champagne);
            writing-mode: vertical-rl;
            transform: rotate(180deg);
            padding: 20px 10px;
            border-radius: 0 12px 12px 0;
            border: none;
            color: var(--noble-green);
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            letter-spacing: 4px;
            z-index: 1050;
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .btn-menu-tag:hover {
            transform: rotate(180deg) translateY(-5px);
        }

        /* --- CONTEÚDO --- */
        .royal-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(197, 163, 88, 0.2);
            border-radius: 2px;
            box-shadow: 0 15px 35px rgba(26, 60, 52, 0.1);
            padding: clamp(1.5rem, 5vw, 3rem);
            margin-bottom: 3rem;
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            color: var(--noble-green);
            letter-spacing: 6px;
            text-transform: uppercase;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .brand-title:hover { opacity: 0.8; color: var(--noble-green); }
    </style>
</head>
<body>

    {% include 'navbar.html' %}

    <div class="container">
        <div class="row min-vh-100 align-items-center justify-content-center">
            <div class="col-12 col-lg-10 text-center">

                <header class="py-5">
                    <h1><a href="/" class="brand-title display-3 fw-bold">Members Tennis Club</a></h1>
                </header>

                <main class="royal-card text-start mx-auto">
                    {% block content %}
                        {% endblock %}
                </main>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
