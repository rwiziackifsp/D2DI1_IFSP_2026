{% extends "master.html" %}

{% block title %}
    Quadro de Membros | RTC
{% endblock %}

{% block content %}

    <div style="margin-bottom: 30px; text-align: left;">
        <a href="/" style="
            text-decoration: none;
            color: var(--noble-green);
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 0.9rem;
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            transition: 0.3s ease;
            opacity: 0.7;
        " onmouseover="this.style.opacity='1'; this.style.paddingLeft='5px'"
           onmouseout="this.style.opacity='0.7'; this.style.paddingLeft='0'">
            <span style="margin-right: 8px; font-size: 1.2rem;">&larr;</span>
            VOLTAR
        </a>
    </div>

    <h2 style="margin-bottom: 40px;">Membros do Clube</h2>

    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="border-bottom: 2px solid var(--champagne); color: var(--noble-green); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;">
                    <th style="padding: 15px;">Nome Completo</th>
                    <th style="padding: 15px; text-align: right;"></th>
                </tr>
            </thead>
            <tbody>
                {% for x in mymembers %}
                <tr style="border-bottom: 1px solid #eee; transition: 0.3s;" onmouseover="this.style.backgroundColor='#fcfbf7'">
                    <td style="padding: 20px; font-family: 'Playfair Display', serif; font-size: 1.2rem;">
                        {{ x.first_name }} {{ x.last_name }}
                    </td>
                    <td style="padding: 20px; text-align: right;">
                        <a href="details/{{ x.id }}" style="color: var(--champagne); text-decoration: none; font-weight: bold; font-size: 0.8rem; text-transform: uppercase;">
                            Ver Perfil →
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock %}
