{% extends 'master.html' %}

{% block title %}
    Novo membro
{% endblock %}

{% block content %}

<div class="card mt-2">
    <div class="card-header">
        Novo membro
    </div>
    <div class="card-body">

        <form action="addrecord/" method="post">
            {% csrf_token %}
            <p>Plan:
                <select name="plan">
                    {% for x in myplans %}
                    <option value="{{ x.id }}">{{ x.title }}</option>
                    {% endfor %}
                </select>
            </p>

            First Name: <br>
            <input name="first">
            <br><br>
            Last Name: <br>
            <input name="last">
            <br><br>
            <input type="submit" value="Submit">
        </form>

        <p><a href="/members">Voltar</a> </p>

    </div>
</div>

{% endblock %}
